name: Quibble and Phan

on:
  push:
    branches:
      - '*'
    tags-ignore:
      - '*.*'
  pull_request:

env:
  DOCKER_REGISTRY: docker-registry.wikimedia.org
  DOCKER_ORG: releng
  QUIBBLE_DOCKER_IMAGE: quibble-buster-php81
  # There is no quibble-buster-php81-coverage yet
  COVERAGE_DOCKER_IMAGE: quibble-buster-php74-coverage
  PHAN_DOCKER_IMAGE: mediawiki-phan-php81

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        mediawiki-version:
          - REL1_43
          - master
        stage:
          - phan
          - coverage
          - phpunit-unit
          - phpunit
          - phpunit-standalone
          - npm-test
          - composer-test
          - selenium
          # - qunit
          # - api-testing

    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3.6.0
        with:
          persist-credentials: false

      # Test-only workflow; npm caching here does not publish runtime artifacts.
      - uses: actions/setup-node@3235b876344d2a9aa001b8d1453c930bba69e610 # v3.9.1 # zizmor: ignore[cache-poisoning]
        if: matrix.stage == 'phpunit' || matrix.stage == 'selenium'
        with:
          node-version: '16'
          cache: npm

      - uses: femiwiki/quibble-action@dc8d9ec9d6c86ba9805a77736c68f974d250aa8f # v1.0.0
        id: quibble
        with:
          stage: ${{ matrix.stage }}
          quibble-docker-image: quibble-buster-php81
          # There is no quibble-buster-php81-coverage yet
          coverage-docker-image: quibble-buster-php74-coverage
          phan-docker-image: mediawiki-phan-php81
          mediawiki-version: ${{ matrix.mediawiki-version }}
          exclude-dependencies: ${{ steps.deps.outputs.exc }}

      - name: Upload coverage to Codecov
        if: matrix.stage == 'coverage'
        uses: codecov/codecov-action@ab904c41d6ece82784817410c45d8b8c02684457 # v3.1.6
        with:
          directory: ${{ steps.quibble.outputs.coverage }}
